<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>History &amp; Rankings</title>
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eed1"/>
      <stop offset="100%" stop-color="#e7d4a3"/>
    </linearGradient>
  </defs>
  <!-- Winners' podium: 2nd / 1st / 3rd -->
  <g stroke="#c9a24c" stroke-width="2" stroke-linejoin="round" fill="url(#parchment)">
    <rect x="9"  y="28" width="14" height="26" rx="1.5"/>
    <rect x="25" y="16" width="14" height="38" rx="1.5"/>
    <rect x="41" y="34" width="14" height="20" rx="1.5"/>
  </g>
  <g fill="#9a6b2f" font-family="Georgia, 'Times New Roman', serif" font-weight="bold"
     font-size="10" text-anchor="middle">
    <text x="16" y="44">2</text>
    <text x="32" y="34">1</text>
    <text x="48" y="48">3</text>
  </g>
  <line x1="6" y1="55" x2="58" y2="55" stroke="#c9a24c" stroke-width="2.5" stroke-linecap="round"/>
</svg>
